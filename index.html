<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Покос. Спил. Порядок. — напишите нам</title>
<meta name="description" content="Покос травы, спил деревьев, уборка участков. Выезд бесплатно. Минск и область. +375 33 382-62-22">
<meta name="theme-color" content="#2d4a2b">

<meta property="og:title" content="Покос. Спил. Порядок.">
<meta property="og:description" content="Покос, спил, уборка участков. Выезд бесплатно. Напишите в удобный мессенджер.">

<style>
  :root{
    --bg:#efe9d9;
    --ink:#0f0f0f;
    --ink-soft:#3a3a3a;
    --green:#2d4a2b;
    --line:rgba(15,15,15,.18);
    --wa:#25D366;
    --vb:#7360F2;
    --tg:#229ED9;
  }

  *,*::before,*::after{box-sizing:border-box}
  html,body{margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}

  body{
    background:var(--bg);
    color:var(--ink);
    font-family:'Manrope',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    font-size:16px;
    line-height:1.45;
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
  }

  /* Top accent band — повторяет тонкую зелёную полосу с листовки */
  .topbar{
    width:100%;
    height:10px;
    background:var(--green);
  }

  main{
    width:100%;
    max-width:560px;
    padding:28px 22px 32px;
    display:flex;
    flex-direction:column;
  }

  /* --- Hero --- */
  .hero h1{
    font-family:'Unbounded',system-ui,sans-serif;
    font-weight:900;
    font-size:clamp(44px,13vw,72px);
    line-height:.98;
    letter-spacing:-.02em;
    margin:0;
  }
  .hero h1 span{display:block}
  .hero h1 .w2{
    color:var(--green);
    font-style:italic;
  }
  .hero p{
    margin:18px 0 0;
    color:#2a2a2a;
    font-size:clamp(17px,4.6vw,20px);
    font-weight:500;
    line-height:1.4;
    max-width:32ch;
  }

  /* --- CTA: messenger tiles --- */
  .cta{
    margin-top:32px;
  }
  .cta-label{
    font-family:'Unbounded',system-ui,sans-serif;
    font-weight:700;
    font-size:22px;
    line-height:1.15;
    margin:0 0 14px;
    letter-spacing:-.01em;
  }

  .msgs{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:8px;
  }
  .msg{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:12px;
    padding:24px 10px 20px;
    min-height:132px;
    color:#fff;
    text-decoration:none;
    font-weight:700;
    font-size:15px;
    letter-spacing:-.005em;
    transition:transform .08s ease, filter .2s ease;
  }
  .msg:hover{filter:brightness(1.06)}
  .msg:active{transform:scale(.97)}
  .msg:focus-visible{outline:3px solid var(--ink);outline-offset:3px}
  .msg svg{
    width:38px;height:38px;
    fill:currentColor;
    display:block;
  }
  .msg.wa{background:var(--wa)}
  .msg.vb{background:var(--vb)}
  .msg.tg{background:var(--tg)}

  /* --- Call row --- */
  .call{
    margin-top:10px;
    background:var(--green);
    color:#fff;
    padding:18px 20px;
    text-decoration:none;
    display:flex;
    align-items:center;
    gap:16px;
  }
  .call-icon{
    width:48px;height:48px;
    flex:0 0 48px;
    background:rgba(255,255,255,.14);
    display:grid;place-items:center;
  }
  .call-icon svg{width:24px;height:24px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  .call-text{flex:1;min-width:0}
  .call small{
    display:block;
    font-size:12px;
    letter-spacing:.18em;
    text-transform:uppercase;
    opacity:.85;
  }
  .call .num{
    font-family:'Unbounded',system-ui,sans-serif;
    font-weight:900;
    font-size:clamp(19px,5.4vw,30px);
    letter-spacing:-.02em;
    font-variant-numeric:tabular-nums;
    white-space:nowrap;
    display:block;
    margin-top:4px;
  }

  @media (max-width:380px){
    .tiles{grid-template-columns:1fr 1fr}
    .tile.cream{grid-column:1 / -1}
    .msg{min-height:116px;padding:20px 8px 16px}
    .msg svg{width:34px;height:34px}
    .call-icon{width:42px;height:42px;flex-basis:42px}
    .call-icon svg{width:20px;height:20px}
  }
</style>
</head>
<body>
