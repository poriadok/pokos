<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>Покос. Спил. Порядок. — напишите нам</title>
    <meta
      name="description"
      content="Покос травы, спил деревьев, уборка участков. Выезд бесплатно. Минск и область. +375 33 382-62-22"
    />
    <meta name="theme-color" content="#2d4a2b" />

    <meta property="og:title" content="Покос. Спил. Порядок." />
    <meta
      property="og:description"
      content="Покос, спил, уборка участков. Выезд бесплатно. Напишите в удобный мессенджер."
    />
    <meta property="og:type" content="website" />

    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%232d4a2b'/%3E%3Ctext x='16' y='23' font-family='system-ui,sans-serif' font-size='20' font-weight='900' text-anchor='middle' fill='%23fff'%3E%D0%9F%3C/text%3E%3C/svg%3E"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&family=Unbounded:wght@700;900&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --bg: #efe9d9;
        --ink: #0f0f0f;
        --ink-soft: #3a3a3a;
        --green: #2d4a2b;
        --line: rgba(15, 15, 15, 0.18);
        --wa: #25d366;
        --vb: #7360f2;
        --tg: #229ed9;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
      }
      html {
        -webkit-text-size-adjust: 100%;
      }

      body {
        background: var(--bg);
        color: var(--ink);
        font-family:
          "Manrope",
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          sans-serif;
        font-size: 16px;
        line-height: 1.45;
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      /* Top accent band — повторяет тонкую зелёную полосу с листовки */
      .topbar {
        width: 100%;
        height: 10px;
        background: var(--green);
      }

      main {
        width: 100%;
        max-width: 560px;
        padding: 28px 22px 32px;
        display: flex;
        flex-direction: column;
      }

      /* --- Hero --- */
      .hero h1 {
        font-family: "Unbounded", system-ui, sans-serif;
        font-weight: 900;
        font-size: clamp(44px, 13vw, 72px);
        line-height: 0.98;
        letter-spacing: -0.02em;
        margin: 0;
      }
      .hero h1 span {
        display: block;
      }
      .hero h1 .w2 {
        color: var(--green);
        font-style: italic;
      }
      .hero p {
        margin: 18px 0 0;
        color: #2a2a2a;
        font-size: clamp(17px, 4.6vw, 20px);
        font-weight: 500;
        line-height: 1.4;
        max-width: 32ch;
      }

      /* --- CTA: messenger tiles --- */
      .cta {
        margin-top: 32px;
      }
      .cta-label {
        font-family: "Unbounded", system-ui, sans-serif;
        font-weight: 700;
        font-size: 22px;
        line-height: 1.15;
        margin: 0 0 14px;
        letter-spacing: -0.01em;
      }

      .msgs {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
      }
      .msg {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 12px;
        padding: 24px 10px 20px;
        min-height: 132px;
        color: #fff;
        text-decoration: none;
        font-weight: 700;
        font-size: 15px;
        letter-spacing: -0.005em;
        transition:
          transform 0.08s ease,
          filter 0.2s ease;
      }
      .msg:hover {
        filter: brightness(1.06);
      }
      .msg:active {
        transform: scale(0.97);
      }
      .msg:focus-visible {
        outline: 3px solid var(--ink);
        outline-offset: 3px;
      }
      .msg img {
        width: 38px;
        height: 38px;
        display: block;
      }
      .msg.wa {
        background: var(--wa);
      }
      .msg.vb {
        background: var(--vb);
      }
      .msg.tg {
        background: var(--tg);
      }

      /* --- Call row --- */
      .call {
        margin-top: 10px;
        background: var(--green);
        color: #fff;
        padding: 18px 20px;
        text-decoration: none;
        display: flex;
        align-items: center;
        gap: 16px;
      }
      .call-icon {
        width: 48px;
        height: 48px;
        flex: 0 0 48px;
        background: rgba(255, 255, 255, 0.14);
        display: grid;
        place-items: center;
      }
      .call-icon svg {
        width: 24px;
        height: 24px;
        stroke: currentColor;
        fill: none;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .call-text {
        flex: 1;
        min-width: 0;
      }
      .call small {
        display: block;
        font-size: 12px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        opacity: 0.85;
      }
      .call .num {
        font-family: "Unbounded", system-ui, sans-serif;
        font-weight: 900;
        font-size: clamp(19px, 5.4vw, 30px);
        letter-spacing: -0.02em;
        font-variant-numeric: tabular-nums;
        white-space: nowrap;
        display: block;
        margin-top: 4px;
      }

      @media (max-width: 380px) {
        .tiles {
          grid-template-columns: 1fr 1fr;
        }
        .tile.cream {
          grid-column: 1 / -1;
        }
        .msg {
          min-height: 116px;
          padding: 20px 8px 16px;
        }
        .msg img {
          width: 34px;
          height: 34px;
        }
        .call-icon {
          width: 42px;
          height: 42px;
          flex-basis: 42px;
        }
        .call-icon svg {
          width: 20px;
          height: 20px;
        }
      }
    </style>
  </head>
  <body>
    <div class="topbar" aria-hidden="true"></div>

    <main>
      <section class="hero">
        <h1>
          <span>Покос.</span>
          <span class="w2">Спил.</span>
          <span>Порядок.</span>
        </h1>
        <p>Работаем аккуратно, с уважением к вашему участку.</p>
      </section>

      <section class="cta" aria-label="Связаться в мессенджере">
        <h2 class="cta-label">Напишите в удобный мессенджер</h2>

        <div class="msgs">
          <a
            class="msg wa"
            href="https://wa.me/375333826222"
            aria-label="Написать в WhatsApp"
          >
            <img src="whatsapp.svg" alt="" aria-hidden="true" />
            <span>WhatsApp</span>
          </a>

          <a
            class="msg vb"
            href="viber://chat?number=%2B375333826222"
            aria-label="Написать в Viber"
          >
            <img src="viber.svg" alt="" aria-hidden="true" />
            <span>Viber</span>
          </a>

          <a
            class="msg tg"
            href="https://t.me/pokos_by"
            aria-label="Написать в Telegram"
          >
            <img src="telegram.svg" alt="" aria-hidden="true" />
            <span>Telegram</span>
          </a>
        </div>
      </section>

      <a class="call" href="tel:+375333826222">
        <span class="call-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24">
            <path
              d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"
            />
          </svg>
        </span>
        <span class="call-text">
          <small>или позвоните</small>
          <span class="num">+375 33 382-62-22</span>
        </span>
      </a>
    </main>
  </body>
</html>
